name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - edited
  merge_group:
    types:
      - checks_requested
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libsqlite3-dev

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.0

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Cache cargo directories
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cargo fmt check
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Cargo check
        run: cargo check --locked --all-targets --all-features

      - name: Set up Bun (optional)
        if: hashFiles('web/package.json') != ''
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Front-end lint (optional)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f web/package.json ]]; then
            cd web
            bun install --frozen-lockfile
            bun run lint
          else
            echo "No web/ package; skipping"
          fi

      - name: Front-end Storybook build (optional)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f web/package.json ]]; then
            cd web
            bun run storybook:build
          else
            echo "No web/ package; skipping"
          fi

      - name: Compute DOCS_BASE (optional)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f docs-site/package.json ]]; then
            owner="${GITHUB_REPOSITORY%%/*}"
            repo="${GITHUB_REPOSITORY##*/}"
            if [[ "${repo}" == "${owner}.github.io" ]]; then
              echo "DOCS_BASE=/" >> "$GITHUB_ENV"
            else
              echo "DOCS_BASE=/${repo}/" >> "$GITHUB_ENV"
            fi
          else
            echo "No docs-site/ package; skipping DOCS_BASE computation"
          fi

      - name: Docs site build (optional)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f docs-site/package.json ]]; then
            bun install --cwd docs-site --frozen-lockfile
            cd docs-site
            DOCS_BASE="${DOCS_BASE:-/}" bun run build
          else
            echo "No docs-site/ package; skipping"
          fi

      - name: Assemble public docs site smoke check (optional)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d docs-site/doc_build && -d web/storybook-static ]]; then
            bash ./.github/scripts/assemble-pages-site.sh docs-site/doc_build web/storybook-static .tmp/pages-site
            test -f .tmp/pages-site/index.html
            test -f .tmp/pages-site/storybook/index.html
            test -f .tmp/pages-site/storybook.html
            grep -q "${DOCS_BASE:-/}storybook.html" .tmp/pages-site/index.html
          else
            echo "docs-site/doc_build or web/storybook-static missing; skipping"
          fi

      - name: Check quality-gates scripts
        run: |
          python3 -m py_compile \
            .github/scripts/release_pr_comment.py \
            .github/scripts/metadata_gate.py \
            .github/scripts/check_live_quality_gates.py \
            .github/scripts/check_quality_gates_contract.py

      - name: Resolve trusted quality-gates sources
        id: trusted-quality-gates
        shell: bash
        run: |
          set -euo pipefail
          trusted_root="$RUNNER_TEMP/trusted-quality-gates"
          mkdir -p "$trusted_root/.github/scripts"
          paths=(
            ".github/quality-gates.json"
            ".github/scripts/check_quality_gates_contract.py"
            ".github/scripts/check_live_quality_gates.py"
            ".github/scripts/metadata_gate.py"
          )
          source_ref="HEAD"
          source_kind="current-branch"
          base_branch=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_branch="${{ github.base_ref }}"
          elif [ "${{ github.event_name }}" = "merge_group" ]; then
            queue_prefix="refs/heads/gh-readonly-queue/"
            if [[ "${GITHUB_REF}" != "${queue_prefix}"* ]]; then
              echo "::error::merge_group ref ${GITHUB_REF} must use the gh-readonly-queue/<base_branch>/... format."
              exit 1
            fi
            queue_ref="${GITHUB_REF#${queue_prefix}}"
            if [[ "${queue_ref}" != */pr-* ]]; then
              echo "::error::Unable to derive the merge_group base branch from ${GITHUB_REF}."
              exit 1
            fi
            base_branch="${queue_ref%%/pr-*}"
            if [ -z "${base_branch}" ]; then
              echo "::error::Unable to derive the merge_group base branch from ${GITHUB_REF}."
              exit 1
            fi
          fi

          if [ -n "${base_branch}" ]; then
            git fetch --no-tags --depth=1 origin "${base_branch}"
            source_ref="origin/${base_branch}"
            source_kind="base-branch"
            if [ "${{ github.event_name }}" = "merge_group" ]; then
              source_kind="merge-group-base-branch"
            fi
            event_name="${{ github.event_name }}"
            for path in "${paths[@]}"; do
              if ! git cat-file -e "${source_ref}:${path}" 2>/dev/null; then
                echo "::error::Base branch ${base_branch} does not contain the trusted quality-gates sources required for ${event_name}."
                exit 1
              fi
            done
          fi

          for path in "${paths[@]}"; do
            mkdir -p "$trusted_root/$(dirname "$path")"
            if [ "$source_ref" = "HEAD" ]; then
              cp "$path" "$trusted_root/$path"
            else
              git show "${source_ref}:${path}" > "$trusted_root/$path"
            fi
          done

          {
            echo "source_kind=$source_kind"
            echo "source_ref=$source_ref"
            echo "base_branch=${base_branch}"
            echo "trusted_root=$trusted_root"
            echo "declaration=$trusted_root/.github/quality-gates.json"
            echo "contract_script=$trusted_root/.github/scripts/check_quality_gates_contract.py"
            echo "live_script=$trusted_root/.github/scripts/check_live_quality_gates.py"
            echo "metadata_script=$trusted_root/.github/scripts/metadata_gate.py"
          } >> "$GITHUB_OUTPUT"

      - name: Quality-gates contract check
        run: |
          python3 "${{ steps.trusted-quality-gates.outputs.contract_script }}" \
            --repo-root "$PWD" \
            --declaration "${{ steps.trusted-quality-gates.outputs.declaration }}" \
            --metadata-script "${{ steps.trusted-quality-gates.outputs.metadata_script }}"

      - name: Quality-gates live rules check
        env:
          QUALITY_GATES_LIVE_RULES_MODE: require
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 "${{ steps.trusted-quality-gates.outputs.live_script }}" \
            --repo "${{ github.repository }}" \
            --declaration "${{ steps.trusted-quality-gates.outputs.declaration }}"

      - name: Quality gates self-tests
        run: |
          bash .github/scripts/test-quality-gates-contract.sh
          bash .github/scripts/test-live-quality-gates.sh
          bash .github/scripts/test-inline-metadata-workflows.sh
          bash .github/scripts/test-release-pr-comment.sh

  unit-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libsqlite3-dev

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.0

      - name: Cache cargo directories
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run cargo test
        run: cargo test --locked --all-features

  frontend-e2e:
    name: Frontend E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            web/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('web/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ runner.os }}-playwright-${{ hashFiles('web/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install web dependencies
        run: |
          set -euo pipefail
          cd web
          bun install --frozen-lockfile

      - name: Install Playwright browser
        run: |
          set -euo pipefail
          cd web
          bunx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: |
          set -euo pipefail
          cd web
          bun run e2e

  worktree-bootstrap:
    name: Worktree Bootstrap Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Cache root Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-root-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-root-bun-

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Run worktree bootstrap smoke test
        run: bun run test:worktree-bootstrap

  build:
    name: Build (Release)
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, frontend-e2e, worktree-bootstrap]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libsqlite3-dev

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.0

      - name: Cargo build (release)
        run: cargo build --release --locked
