name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      head_sha:
        description: Commit SHA on main to backfill release for
        required: true
        type: string

permissions:
  contents: write
  packages: write
  issues: read
  pull-requests: read

env:
  REGISTRY: ghcr.io
  PLATFORMS: linux/amd64
  REQUESTED_HEAD_SHA: ${{ github.event_name == 'workflow_dispatch' && inputs.head_sha || github.sha }}

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  plan:
    name: Plan release target
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      release_head_sha: ${{ steps.plan.outputs.release_head_sha }}
      release_pr_number: ${{ steps.plan.outputs.release_pr_number }}
      release_pr_url: ${{ steps.plan.outputs.release_pr_url }}
      selection_reason: ${{ steps.plan.outputs.selection_reason }}
      selection_pending_reason: ${{ steps.plan.outputs.selection_pending_reason }}
      next_pending_head_sha: ${{ steps.plan.outputs.next_pending_head_sha }}
      next_pending_pr_number: ${{ steps.plan.outputs.next_pending_pr_number }}
      next_pending_reason: ${{ steps.plan.outputs.next_pending_reason }}
      pending_unpublished_count: ${{ steps.plan.outputs.pending_unpublished_count }}
      pending_repair_count: ${{ steps.plan.outputs.pending_repair_count }}
    steps:
      - name: Checkout main history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Determine release target
        id: plan
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_REQUESTED_SHA: ${{ github.event_name == 'workflow_dispatch' && inputs.head_sha || '' }}
        run: |
          set -euo pipefail
          python3 ./.github/scripts/release_backfill.py plan \
            --repo-root "$PWD" \
            --head-ref HEAD \
            --default-sha "${REQUESTED_HEAD_SHA}"

      - name: Write summary
        shell: bash
        run: |
          {
            echo "### Release target plan"
            echo "- requested_head_sha: ${REQUESTED_HEAD_SHA}"
            echo "- release_head_sha: ${{ steps.plan.outputs.release_head_sha }}"
            echo "- selection_reason: ${{ steps.plan.outputs.selection_reason }}"
            echo "- selection_pending_reason: ${{ steps.plan.outputs.selection_pending_reason }}"
            echo "- release_pr: #${{ steps.plan.outputs.release_pr_number }}"
            echo "- next_pending_head_sha: ${{ steps.plan.outputs.next_pending_head_sha }}"
            echo "- pending_unpublished_count: ${{ steps.plan.outputs.pending_unpublished_count }}"
            echo "- pending_repair_count: ${{ steps.plan.outputs.pending_repair_count }}"
          } >> "$GITHUB_STEP_SUMMARY"

  await-ci:
    name: Await current push CI
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: [plan]
    outputs:
      allow_release: ${{ steps.gate.outputs.allow_release }}
      backfill_head_sha: ${{ steps.gate.outputs.backfill_head_sha }}
      blocked_ci_head_sha: ${{ steps.gate.outputs.blocked_ci_head_sha }}
      ci_run_id: ${{ steps.gate.outputs.ci_run_id }}
      ci_status: ${{ steps.gate.outputs.ci_status }}
      ci_conclusion: ${{ steps.gate.outputs.ci_conclusion }}
      ci_reason: ${{ steps.gate.outputs.ci_reason }}
    steps:
      - name: Checkout workflow revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.workflow_sha }}

      - name: Gate current push release against CI
        id: gate
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${{ needs.plan.outputs.release_pr_number }}" ]]; then
            echo "allow_release=true" >> "$GITHUB_OUTPUT"
            echo "backfill_head_sha=" >> "$GITHUB_OUTPUT"
            echo "blocked_ci_head_sha=" >> "$GITHUB_OUTPUT"
            echo "ci_run_id=" >> "$GITHUB_OUTPUT"
            echo "ci_status=skipped" >> "$GITHUB_OUTPUT"
            echo "ci_conclusion=skipped" >> "$GITHUB_OUTPUT"
            echo "ci_reason=no_release_candidate" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          timeout_seconds=1800
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ needs.plan.outputs.release_head_sha }}" != "${REQUESTED_HEAD_SHA}" ]]; then
            timeout_seconds=120
          fi

          python3 ./.github/scripts/release_backfill.py await-ci \
            --head-sha "${{ needs.plan.outputs.release_head_sha }}" \
            --workflow-id ci.yml \
            --event push \
            --poll-interval 10 \
            --timeout-seconds "${timeout_seconds}"

      - name: Write summary
        if: always()
        shell: bash
        run: |
          {
            echo "### Current push CI gate"
            echo "- requested_head_sha: ${REQUESTED_HEAD_SHA}"
            echo "- release_head_sha: ${{ needs.plan.outputs.release_head_sha }}"
            echo "- allow_release: ${{ steps.gate.outputs.allow_release }}"
            echo "- ci_reason: ${{ steps.gate.outputs.ci_reason }}"
            echo "- ci_run_id: ${{ steps.gate.outputs.ci_run_id }}"
            echo "- ci_status: ${{ steps.gate.outputs.ci_status }}"
            echo "- ci_conclusion: ${{ steps.gate.outputs.ci_conclusion }}"
            echo "- backfill_head_sha: ${{ steps.gate.outputs.backfill_head_sha }}"
            echo "- blocked_ci_head_sha: ${{ steps.gate.outputs.blocked_ci_head_sha }}"
          } >> "$GITHUB_STEP_SUMMARY"

  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [plan, await-ci]
    if: ${{ needs.await-ci.outputs.allow_release == 'true' }}
    env:
      RELEASE_HEAD_SHA: ${{ needs.plan.outputs.release_head_sha }}
    outputs:
      should_release: ${{ steps.intent.outputs.should_release }}
      bump_level: ${{ steps.intent.outputs.bump_level }}
      channel: ${{ steps.intent.outputs.channel }}
      prerelease: ${{ steps.intent.outputs.prerelease }}
      release_intent_label: ${{ steps.intent.outputs.release_intent_label }}
      pr_number: ${{ steps.intent.outputs.pr_number }}
      pr_url: ${{ steps.intent.outputs.pr_url }}
      reason: ${{ steps.intent.outputs.reason }}
      app_effective_version: ${{ steps.export.outputs.app_effective_version }}
      app_release_tag: ${{ steps.export.outputs.app_release_tag }}
      app_is_prerelease: ${{ steps.export.outputs.app_is_prerelease }}
    steps:
      - name: Checkout main history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Determine release intent
        id: intent
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash ./.github/scripts/release-intent.sh

      - name: Compute effective version
        if: ${{ steps.intent.outputs.should_release == 'true' }}
        shell: bash
        env:
          BUMP_LEVEL: ${{ steps.intent.outputs.bump_level }}
          RELEASE_CHANNEL: ${{ steps.intent.outputs.channel }}
          COMMIT_SHA: ${{ env.RELEASE_HEAD_SHA }}
        run: bash ./.github/scripts/compute-version.sh

      - name: Export release metadata
        id: export
        shell: bash
        run: |
          set -euo pipefail
          echo "app_effective_version=${APP_EFFECTIVE_VERSION:-}" >> "$GITHUB_OUTPUT"
          echo "app_release_tag=${APP_RELEASE_TAG:-}" >> "$GITHUB_OUTPUT"
          echo "app_is_prerelease=${APP_IS_PRERELEASE:-false}" >> "$GITHUB_OUTPUT"

      - name: Validate effective version export
        if: ${{ steps.intent.outputs.should_release == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${APP_EFFECTIVE_VERSION:-}" ]]; then
            echo "APP_EFFECTIVE_VERSION is empty; stop release to avoid stale UI version."
            exit 1
          fi
          echo "APP_EFFECTIVE_VERSION=${APP_EFFECTIVE_VERSION}"

      - name: Validate historical release credentials
        if: ${{ steps.intent.outputs.should_release == 'true' }}
        id: release-auth
        shell: bash
        env:
          RELEASE_TOKEN_PRESENT: ${{ secrets.RELEASE_TOKEN != '' && 'true' || 'false' }}
        run: |
          set -euo pipefail
          tag="${APP_RELEASE_TAG}"
          tag_exists=false
          main_head_sha="$(git rev-parse HEAD)"
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            tag_exists=true
          fi

          requires_elevated_token=false
          if [[ "${RELEASE_HEAD_SHA}" != "${main_head_sha}" && "${tag_exists}" != "true" ]]; then
            requires_elevated_token=true
          fi

          echo "tag_exists=${tag_exists}" >> "$GITHUB_OUTPUT"
          echo "requires_elevated_token=${requires_elevated_token}" >> "$GITHUB_OUTPUT"

          if [[ "${requires_elevated_token}" == "true" && "${RELEASE_TOKEN_PRESENT}" != "true" ]]; then
            echo "Historical release target ${RELEASE_HEAD_SHA} needs RELEASE_TOKEN to create missing tag ${tag}." >&2
            echo "Add repo secret RELEASE_TOKEN with a workflow-capable GitHub token, or pre-push refs/tags/${tag} to ${RELEASE_HEAD_SHA} before rerunning release." >&2
            exit 1
          fi

      - name: Create GitHub Release for existing tag
        if: ${{ steps.intent.outputs.should_release == 'true' && steps.release-auth.outputs.tag_exists == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.export.outputs.app_release_tag }}
          name: ${{ steps.export.outputs.app_release_tag }}
          prerelease: ${{ steps.intent.outputs.prerelease == 'true' }}
          generate_release_notes: true
          token: ${{ secrets.RELEASE_TOKEN != '' && secrets.RELEASE_TOKEN || github.token }}

      - name: Create GitHub Release for missing tag
        if: ${{ steps.intent.outputs.should_release == 'true' && steps.release-auth.outputs.tag_exists != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.export.outputs.app_release_tag }}
          target_commitish: ${{ env.RELEASE_HEAD_SHA }}
          name: ${{ steps.export.outputs.app_release_tag }}
          prerelease: ${{ steps.intent.outputs.prerelease == 'true' }}
          generate_release_notes: true
          token: ${{ secrets.RELEASE_TOKEN != '' && secrets.RELEASE_TOKEN || github.token }}

      - name: Write summary
        if: always()
        shell: bash
        run: |
          pr_url="${{ steps.intent.outputs.pr_url }}"
          if [[ -z "${pr_url}" ]]; then
            pr_url="n/a"
          fi
          {
            echo "### Release decision"
            echo "- requested_head_sha: ${REQUESTED_HEAD_SHA}"
            echo "- release_head_sha: ${RELEASE_HEAD_SHA}"
            echo "- selection_reason: ${{ needs.plan.outputs.selection_reason }}"
            echo "- should_release: ${{ steps.intent.outputs.should_release }}"
            echo "- reason: ${{ steps.intent.outputs.reason }}"
            echo "- release_intent_label: ${{ steps.intent.outputs.release_intent_label }}"
            echo "- channel: ${{ steps.intent.outputs.channel }}"
            echo "- prerelease: ${{ steps.intent.outputs.prerelease }}"
            echo "- app_release_tag: ${APP_RELEASE_TAG:-<none>}"
            echo "- release_tag_exists: ${{ steps.release-auth.outputs.tag_exists }}"
            echo "- release_requires_elevated_token: ${{ steps.release-auth.outputs.requires_elevated_token }}"
            echo "- pr: ${pr_url}"
          } >> "$GITHUB_STEP_SUMMARY"

  docker-release:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [plan, prepare]
    if: ${{ needs.prepare.outputs.should_release == 'true' }}
    permissions:
      contents: read
      packages: write
    env:
      RELEASE_HEAD_SHA: ${{ needs.plan.outputs.release_head_sha }}
      APP_EFFECTIVE_VERSION: ${{ needs.prepare.outputs.app_effective_version }}
      APP_RELEASE_TAG: ${{ needs.prepare.outputs.app_release_tag }}
      APP_IS_PRERELEASE: ${{ needs.prepare.outputs.app_is_prerelease }}
    steps:
      - name: Checkout release revision
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_HEAD_SHA }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute lowercase image name
        id: image
        shell: bash
        run: |
          set -euo pipefail
          lower="${GITHUB_REPOSITORY,,}"
          image="${{ env.REGISTRY }}/${lower}"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Compute Docker tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          image="${{ steps.image.outputs.image }}"
          if [[ "${APP_IS_PRERELEASE}" == "true" ]]; then
            tags="${image}:${APP_RELEASE_TAG}"
          else
            tags="${image}:${APP_RELEASE_TAG}\n${image}:latest"
          fi
          {
            echo "tags<<EOF"
            printf "%b\n" "${tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            APP_EFFECTIVE_VERSION=${{ env.APP_EFFECTIVE_VERSION }}
          cache-from: type=registry,ref=${{ steps.image.outputs.image }}:buildcache
          cache-to: type=registry,ref=${{ steps.image.outputs.image }}:buildcache,mode=max

  pr-release-comment:
    name: Comment PR with release version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [prepare, docker-release]
    if: ${{ needs.prepare.outputs.should_release == 'true' && needs.prepare.outputs.pr_number != '' }}
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout workflow revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.workflow_sha }}

      - name: Upsert PR release comment
        id: comment
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHOULD_RELEASE: ${{ needs.prepare.outputs.should_release }}
          PR_NUMBER: ${{ needs.prepare.outputs.pr_number }}
          APP_EFFECTIVE_VERSION: ${{ needs.prepare.outputs.app_effective_version }}
          APP_RELEASE_TAG: ${{ needs.prepare.outputs.app_release_tag }}
        run: python3 ./.github/scripts/release_pr_comment.py

      - name: Write summary
        if: always()
        shell: bash
        run: |
          {
            echo "### Release PR comment"
            echo "- pr: #${{ needs.prepare.outputs.pr_number }}"
            echo "- action: ${{ steps.comment.outputs.comment_action }}"
            echo "- tag: ${{ needs.prepare.outputs.app_release_tag }}"
            echo "- release: ${{ steps.comment.outputs.release_url }}"
            if [[ -n "${{ steps.comment.outputs.comment_url }}" ]]; then
              echo "- comment: ${{ steps.comment.outputs.comment_url }}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  audit-backfill:
    name: Dispatch next backfill
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [plan, await-ci, prepare, docker-release, pr-release-comment]
    if: >-
      always() &&
      github.event_name == 'push' &&
      needs.plan.result == 'success' &&
      needs.await-ci.result == 'success' &&
      (needs.prepare.result == 'success' || needs.await-ci.outputs.allow_release == 'false') &&
      (needs.docker-release.result == 'success' || needs.docker-release.result == 'skipped') &&
      (needs.pr-release-comment.result == 'success' || needs.pr-release-comment.result == 'skipped')
    permissions:
      contents: read
      issues: read
      pull-requests: read
      actions: write
    steps:
      - name: Checkout main history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Resolve next dispatch target
        id: target
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          python3 ./.github/scripts/release_backfill.py plan \
            --repo-root "$PWD" \
            --head-ref HEAD \
            --default-sha '' \
            --exclude-sha "${{ needs.plan.outputs.release_head_sha }}" \
            --exclude-sha "${{ needs.await-ci.outputs.blocked_ci_head_sha }}"

      - name: Dispatch next release backfill
        if: ${{ steps.target.outputs.release_head_sha != '' }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          python3 ./.github/scripts/release_backfill.py dispatch \
            --head-sha "${{ steps.target.outputs.release_head_sha }}" \
            --workflow-id release.yml \
            --ref main

      - name: Write summary
        if: always()
        shell: bash
        run: |
          {
            echo "### Release backfill audit"
            echo "- current_release_head_sha: ${{ needs.plan.outputs.release_head_sha }}"
            echo "- ci_reason: ${{ needs.await-ci.outputs.ci_reason }}"
            echo "- blocked_ci_head_sha: ${{ needs.await-ci.outputs.blocked_ci_head_sha }}"
            echo "- next_pending_head_sha: ${{ steps.target.outputs.release_head_sha }}"
            echo "- next_pending_reason: ${{ steps.target.outputs.selection_pending_reason }}"
            echo "- next_pending_pr_number: ${{ steps.target.outputs.release_pr_number }}"
          } >> "$GITHUB_STEP_SUMMARY"
