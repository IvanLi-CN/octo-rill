name: Release

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      head_sha:
        description: Existing released commit SHA to backfill assets for (optional)
        required: false
        type: string
      release_tag:
        description: Existing release tag to backfill assets for (defaults to latest published release)
        required: false
        type: string

permissions:
  contents: write
  packages: write
  issues: read
  pull-requests: read

env:
  REGISTRY: ghcr.io
  PLATFORMS: linux/amd64
  RELEASE_BUNDLE_NAME: octo-rill-linux-x86_64
  RELEASE_TRIGGER_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.head_sha }}

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && (inputs.release_tag || inputs.head_sha || 'latest') || github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push') ||
      github.event_name == 'workflow_dispatch'
    outputs:
      should_release: ${{ steps.metadata.outputs.should_release }}
      bump_level: ${{ steps.intent.outputs.bump_level }}
      channel: ${{ steps.intent.outputs.channel }}
      prerelease: ${{ steps.metadata.outputs.app_is_prerelease }}
      release_intent_label: ${{ steps.intent.outputs.release_intent_label }}
      pr_number: ${{ steps.intent.outputs.pr_number }}
      pr_url: ${{ steps.intent.outputs.pr_url }}
      reason: ${{ steps.metadata.outputs.reason }}
      release_mode: ${{ steps.metadata.outputs.release_mode }}
      release_head_sha: ${{ steps.metadata.outputs.release_head_sha }}
      app_effective_version: ${{ steps.metadata.outputs.app_effective_version }}
      app_release_tag: ${{ steps.metadata.outputs.app_release_tag }}
      app_is_prerelease: ${{ steps.metadata.outputs.app_is_prerelease }}
      reuse_existing_tag: ${{ steps.metadata.outputs.reuse_existing_tag }}
      publish_docker: ${{ steps.metadata.outputs.publish_docker }}
      generate_release_notes: ${{ steps.metadata.outputs.generate_release_notes }}
      release_tag_source: ${{ steps.metadata.outputs.release_tag_source }}
    steps:
      - name: Checkout release context
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.head_sha || github.ref }}

      - name: Determine release intent
        if: ${{ github.event_name == 'workflow_run' }}
        id: intent
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_RUN_SHA: ${{ env.RELEASE_TRIGGER_SHA }}
        run: bash ./.github/scripts/release-intent.sh

      - name: Refresh local tags
        shell: bash
        run: git fetch --tags --force

      - name: Resolve release metadata
        id: metadata
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_RUN_SHA: ${{ env.RELEASE_TRIGGER_SHA }}
          INPUT_HEAD_SHA: ${{ inputs.head_sha }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          INTENT_SHOULD_RELEASE: ${{ steps.intent.outputs.should_release }}
          INTENT_BUMP_LEVEL: ${{ steps.intent.outputs.bump_level }}
          INTENT_CHANNEL: ${{ steps.intent.outputs.channel }}
          INTENT_REASON: ${{ steps.intent.outputs.reason }}
          REPO_ROOT: ${{ github.workspace }}
        run: python3 ./.github/scripts/release_metadata.py

      - name: Validate release metadata
        if: ${{ steps.metadata.outputs.should_release == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ steps.metadata.outputs.app_effective_version }}" ]]; then
            echo "APP_EFFECTIVE_VERSION is empty; stop release to avoid stale UI version."
            exit 1
          fi
          echo "APP_EFFECTIVE_VERSION=${{ steps.metadata.outputs.app_effective_version }}"

      - name: Write summary
        if: always()
        shell: bash
        run: |
          pr_url="${{ steps.intent.outputs.pr_url }}"
          if [[ -z "${pr_url}" ]]; then
            pr_url="n/a"
          fi
          {
            echo "### Release decision"
            echo "- should_release: ${{ steps.intent.outputs.should_release }}"
            echo "- resolved_should_release: ${{ steps.metadata.outputs.should_release }}"
            echo "- reason: ${{ steps.metadata.outputs.reason }}"
            echo "- release_mode: ${{ steps.metadata.outputs.release_mode }}"
            echo "- release_tag_source: ${{ steps.metadata.outputs.release_tag_source }}"
            echo "- reuse_existing_tag: ${{ steps.metadata.outputs.reuse_existing_tag }}"
            echo "- release_intent_label: ${{ steps.intent.outputs.release_intent_label }}"
            echo "- channel: ${{ steps.intent.outputs.channel }}"
            echo "- prerelease: ${{ steps.metadata.outputs.app_is_prerelease }}"
            echo "- publish_docker: ${{ steps.metadata.outputs.publish_docker }}"
            echo "- release_head_sha: ${{ steps.metadata.outputs.release_head_sha }}"
            echo "- app_release_tag: ${{ steps.metadata.outputs.app_release_tag || '<none>' }}"
            echo "- pr: ${pr_url}"
          } >> "$GITHUB_STEP_SUMMARY"

  bundle-release:
    name: Build release bundle
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [prepare]
    if: ${{ needs.prepare.outputs.should_release == 'true' }}
    permissions:
      contents: read
    env:
      APP_EFFECTIVE_VERSION: ${{ needs.prepare.outputs.app_effective_version }}
      BUNDLE_NAME: ${{ env.RELEASE_BUNDLE_NAME }}
    steps:
      - name: Checkout release target
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.release_head_sha }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libsqlite3-dev

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Cache cargo directories
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-bundle-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-release-bundle-cargo-

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            web/node_modules
          key: ${{ runner.os }}-release-bundle-bun-${{ hashFiles('web/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-release-bundle-bun-

      - name: Build release bundle
        id: bundle
        shell: bash
        run: bash ./.github/scripts/build-release-bundle.sh

      - name: Verify release bundle contents
        shell: bash
        run: |
          set -euo pipefail
          archive_path="${{ steps.bundle.outputs.archive_path }}"
          extract_root="$RUNNER_TEMP/release-bundle-check"
          mkdir -p "${extract_root}"
          tar -xzf "${archive_path}" -C "${extract_root}"
          test -x "${extract_root}/${{ env.RELEASE_BUNDLE_NAME }}/octo-rill"
          test -f "${extract_root}/${{ env.RELEASE_BUNDLE_NAME }}/.env.example"
          test -f "${extract_root}/${{ env.RELEASE_BUNDLE_NAME }}/web/dist/index.html"

      - name: Upload release bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RELEASE_BUNDLE_NAME }}
          path: ${{ steps.bundle.outputs.archive_path }}
          if-no-files-found: error

  docker-release:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [prepare]
    if: ${{ needs.prepare.outputs.should_release == 'true' && needs.prepare.outputs.publish_docker == 'true' }}
    permissions:
      contents: read
      packages: write
    env:
      APP_EFFECTIVE_VERSION: ${{ needs.prepare.outputs.app_effective_version }}
      APP_RELEASE_TAG: ${{ needs.prepare.outputs.app_release_tag }}
      APP_IS_PRERELEASE: ${{ needs.prepare.outputs.app_is_prerelease }}
    steps:
      - name: Checkout release target
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.release_head_sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute lowercase image name
        id: image
        shell: bash
        run: |
          set -euo pipefail
          lower="${GITHUB_REPOSITORY,,}"
          image="${{ env.REGISTRY }}/${lower}"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Compute Docker tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          image="${{ steps.image.outputs.image }}"
          if [[ "${APP_IS_PRERELEASE}" == "true" ]]; then
            tags="${image}:${APP_RELEASE_TAG}"
          else
            tags="${image}:${APP_RELEASE_TAG}\n${image}:latest"
          fi
          {
            echo "tags<<EOF"
            printf "%b\n" "${tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            APP_EFFECTIVE_VERSION=${{ env.APP_EFFECTIVE_VERSION }}
          cache-from: type=registry,ref=${{ steps.image.outputs.image }}:buildcache
          cache-to: type=registry,ref=${{ steps.image.outputs.image }}:buildcache,mode=max

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [prepare, bundle-release, docker-release]
    if: >-
      ${{
        always() &&
        needs.prepare.outputs.should_release == 'true' &&
        needs['bundle-release'].result == 'success' &&
        (needs.prepare.outputs.publish_docker != 'true' || needs['docker-release'].result == 'success')
      }}
    permissions:
      contents: write
    steps:
      - name: Checkout release target
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.release_head_sha }}

      - name: Refresh local tags
        run: git fetch --tags --force

      - name: Configure Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag (if missing)
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare.outputs.app_release_tag }}"
          echo "target tag: ${tag}"
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists. Skipping push."
          else
            git tag -a "${tag}" -m "${tag}"
            git push origin "${tag}"
          fi

      - name: Download release bundle artifact
        uses: actions/download-artifact@v5
        with:
          name: ${{ env.RELEASE_BUNDLE_NAME }}
          path: ./.artifacts/release-bundle

      - name: Create or update GitHub Release
        if: ${{ needs.prepare.outputs.generate_release_notes == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.app_release_tag }}
          name: ${{ needs.prepare.outputs.app_release_tag }}
          prerelease: ${{ needs.prepare.outputs.app_is_prerelease == 'true' }}
          generate_release_notes: true
          files: |
            ./.artifacts/release-bundle/${{ env.RELEASE_BUNDLE_NAME }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update GitHub Release assets
        if: ${{ needs.prepare.outputs.generate_release_notes != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.app_release_tag }}
          name: ${{ needs.prepare.outputs.app_release_tag }}
          prerelease: ${{ needs.prepare.outputs.app_is_prerelease == 'true' }}
          files: |
            ./.artifacts/release-bundle/${{ env.RELEASE_BUNDLE_NAME }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Write summary
        if: always()
        shell: bash
        run: |
          {
            echo "### Release publish"
            echo "- release: ${{ needs.prepare.outputs.app_release_tag }}"
            echo "- release_mode: ${{ needs.prepare.outputs.release_mode }}"
            echo "- publish_docker: ${{ needs.prepare.outputs.publish_docker }}"
            echo "- release_notes: ${{ needs.prepare.outputs.generate_release_notes }}"
            echo "- bundle_asset: ${{ env.RELEASE_BUNDLE_NAME }}.tar.gz"
          } >> "$GITHUB_STEP_SUMMARY"

  pr-release-comment:
    name: Comment PR with release version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [prepare, publish-release]
    if: ${{ always() && needs.prepare.outputs.should_release == 'true' && needs.prepare.outputs.pr_number != '' && needs['publish-release'].result == 'success' }}
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout workflow revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.workflow_sha }}

      - name: Upsert PR release comment
        id: comment
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHOULD_RELEASE: ${{ needs.prepare.outputs.should_release }}
          PR_NUMBER: ${{ needs.prepare.outputs.pr_number }}
          APP_EFFECTIVE_VERSION: ${{ needs.prepare.outputs.app_effective_version }}
          APP_RELEASE_TAG: ${{ needs.prepare.outputs.app_release_tag }}
        run: python3 ./.github/scripts/release_pr_comment.py

      - name: Write summary
        if: always()
        shell: bash
        run: |
          {
            echo "### Release PR comment"
            echo "- pr: #${{ needs.prepare.outputs.pr_number }}"
            echo "- action: ${{ steps.comment.outputs.comment_action }}"
            echo "- tag: ${{ needs.prepare.outputs.app_release_tag }}"
            echo "- release: ${{ steps.comment.outputs.release_url }}"
            if [[ -n "${{ steps.comment.outputs.comment_url }}" ]]; then
              echo "- comment: ${{ steps.comment.outputs.comment_url }}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
