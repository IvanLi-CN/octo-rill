name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - edited
  merge_group:
    types:
      - checks_requested
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PLATFORM_AMD64: linux/amd64
  PLATFORM_ARM64: linux/arm64
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libsqlite3-dev

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.0
          components: rustfmt

      - name: Cache cargo directories
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cargo fmt check
        run: cargo fmt --all -- --check

      - name: Cargo check
        run: cargo check --locked --all-targets --all-features

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install repo tooling
        run: bun install --frozen-lockfile

      - name: Install front-end dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Bun-first guard
        run: bun run check:bun-first

      - name: Check quality-gates scripts
        run: |
          python3 -m py_compile \
            .github/scripts/metadata_gate.py \
            .github/scripts/check_live_quality_gates.py \
            .github/scripts/check_quality_gates_contract.py

      - name: Resolve trusted quality-gates sources
        id: trusted-quality-gates
        shell: bash
        run: |
          set -euo pipefail
          trusted_root="$RUNNER_TEMP/trusted-quality-gates"
          mkdir -p "$trusted_root/.github/scripts"
          paths=(
            ".github/quality-gates.json"
            ".github/scripts/check_quality_gates_contract.py"
            ".github/scripts/check_live_quality_gates.py"
            ".github/scripts/metadata_gate.py"
          )
          source_ref="HEAD"
          source_kind="current-branch"
          base_branch=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_branch="${{ github.base_ref }}"
          elif [ "${{ github.event_name }}" = "merge_group" ]; then
            queue_prefix="refs/heads/gh-readonly-queue/"
            if [[ "${GITHUB_REF}" != "${queue_prefix}"* ]]; then
              echo "::error::merge_group ref ${GITHUB_REF} must use the gh-readonly-queue/<base_branch>/... format."
              exit 1
            fi
            queue_ref="${GITHUB_REF#${queue_prefix}}"
            if [[ "${queue_ref}" != */pr-* ]]; then
              echo "::error::Unable to derive the merge_group base branch from ${GITHUB_REF}."
              exit 1
            fi
            base_branch="${queue_ref%%/pr-*}"
            if [ -z "${base_branch}" ]; then
              echo "::error::Unable to derive the merge_group base branch from ${GITHUB_REF}."
              exit 1
            fi
          fi

          if [ -n "${base_branch}" ]; then
            git fetch --no-tags --depth=1 origin "${base_branch}"
            source_ref="origin/${base_branch}"
            source_kind="base-branch"
            if [ "${{ github.event_name }}" = "merge_group" ]; then
              source_kind="merge-group-base-branch"
            fi
            event_name="${{ github.event_name }}"
            for path in "${paths[@]}"; do
              if ! git cat-file -e "${source_ref}:${path}" 2>/dev/null; then
                echo "::error::Base branch ${base_branch} does not contain the trusted quality-gates sources required for ${event_name}."
                exit 1
              fi
            done
          fi

          for path in "${paths[@]}"; do
            mkdir -p "$trusted_root/$(dirname "$path")"
            if [ "$source_ref" = "HEAD" ]; then
              cp "$path" "$trusted_root/$path"
            else
              git show "${source_ref}:${path}" > "$trusted_root/$path"
            fi
          done

          {
            echo "source_kind=$source_kind"
            echo "source_ref=$source_ref"
            echo "trusted_root=$trusted_root"
            echo "declaration=$trusted_root/.github/quality-gates.json"
            echo "contract_script=$trusted_root/.github/scripts/check_quality_gates_contract.py"
            echo "live_script=$trusted_root/.github/scripts/check_live_quality_gates.py"
            echo "metadata_script=$trusted_root/.github/scripts/metadata_gate.py"
          } >> "$GITHUB_OUTPUT"

      - name: Quality-gates contract check
        run: |
          python3 "${{ steps.trusted-quality-gates.outputs.contract_script }}" \
            --repo-root "$PWD" \
            --declaration "${{ steps.trusted-quality-gates.outputs.declaration }}" \
            --metadata-script "${{ steps.trusted-quality-gates.outputs.metadata_script }}"

      - name: Quality-gates live rules check
        env:
          QUALITY_GATES_LIVE_RULES_MODE: require
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 "${{ steps.trusted-quality-gates.outputs.live_script }}" \
            --repo "${{ github.repository }}" \
            --declaration "${{ steps.trusted-quality-gates.outputs.declaration }}"

      - name: Quality gates self-tests
        run: |
          bash .github/scripts/test-quality-gates-contract.sh
          bash .github/scripts/test-live-quality-gates.sh

      - name: Front-end lint
        working-directory: web
        run: bun run lint

  frontend-tests:
    name: Front-end Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install front-end dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Run front-end Vitest suite
        working-directory: web
        run: bun run test

  records-overlay-e2e:
    name: Records Overlay E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install front-end dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        working-directory: web
        run: bunx playwright install --with-deps chromium

      - name: Start Vite dev server
        working-directory: web
        run: |
          bun run dev -- --host 127.0.0.1 --port 60080 > /tmp/codex-vibe-monitor-vite.log 2>&1 &
          echo $! > /tmp/codex-vibe-monitor-vite.pid

      - name: Wait for Vite readiness
        run: |
          for _ in {1..60}; do
            if curl -fsS http://127.0.0.1:60080/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Vite dev server failed to start within 60 seconds."
          cat /tmp/codex-vibe-monitor-vite.log || true
          exit 1

      - name: Run records overlay Playwright regression
        working-directory: web
        run: bun run test:e2e -- records-filter-overlay.spec.ts

      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: records-overlay-playwright-report
          path: |
            web/playwright-report
            web/test-results
          if-no-files-found: ignore

      - name: Stop Vite dev server
        if: always()
        run: |
          if [ -f /tmp/codex-vibe-monitor-vite.pid ]; then
            kill "$(cat /tmp/codex-vibe-monitor-vite.pid)" || true
          fi

  unit-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libsqlite3-dev

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.0

      - name: Cache cargo directories
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run cargo test
        run: cargo test --locked --all-features

  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    if: github.event_name != 'push'
    needs: [lint, frontend-tests, records-overlay-e2e, unit-tests]
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libsqlite3-dev

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install repo tooling
        run: bun install --frozen-lockfile

      - name: Install front-end dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Front-end build
        working-directory: web
        run: bun run build

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.0

      - name: Cache cargo directories
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cargo build (release)
        run: cargo build --release --locked

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build smoke image (linux/amd64, load)
        shell: bash
        env:
          SMOKE_TAG: codex-vibe-monitor:pr-smoke-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          docker buildx build \
            --load \
            --platform "${PLATFORM_AMD64}" \
            --tag "${SMOKE_TAG}" \
            --build-arg APP_EFFECTIVE_VERSION=pr-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT} \
            .

      - name: Smoke test image (linux/amd64)
        shell: bash
        env:
          SMOKE_TAG: codex-vibe-monitor:pr-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          SMOKE_CONTAINER_NAME: smoke-codex-vibe-monitor-pr-${{ github.run_id }}-${{ github.run_attempt }}
          SMOKE_PLATFORM: ${{ env.PLATFORM_AMD64 }}
        run: ./.github/scripts/smoke-test-image.sh "$SMOKE_TAG"

  release-meta:
    name: Release Meta (intent + version + tags)
    runs-on: ubuntu-latest
    needs: [lint, frontend-tests, records-overlay-e2e, unit-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pull-requests: read
    outputs:
      release_enabled: ${{ steps.intent.outputs.release_enabled }}
      release_bump: ${{ steps.intent.outputs.release_bump }}
      release_channel: ${{ steps.intent.outputs.release_channel }}
      pr_number: ${{ steps.intent.outputs.pr_number }}
      pr_title: ${{ steps.intent.outputs.pr_title }}
      image_name_lower: ${{ steps.image-name.outputs.image_name_lower }}
      app_effective_version: ${{ steps.version.outputs.app_effective_version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      release_prerelease: ${{ steps.version.outputs.release_prerelease }}
      tags_csv: ${{ steps.image-tags.outputs.tags_csv }}
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release intent (PR labels)
        id: intent
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo
            const sha = context.sha
            const allowedTypes = new Set([
              'type:patch',
              'type:minor',
              'type:major',
              'type:docs',
              'type:skip',
            ])
            const allowedChannels = new Set(['channel:stable', 'channel:rc'])

            const prsResp = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: sha,
              mediaType: { previews: ['groot'] },
            })
            const prs = prsResp.data || []

            if (prs.length !== 1) {
              core.notice(
                `Release disabled: expected exactly 1 PR associated with commit ${sha}, got ${prs.length}`
              )
              core.setOutput('release_enabled', 'false')
              return
            }

            const pr = prs[0]
            const labels = (pr.labels || []).map(l => l?.name).filter(Boolean)
            const typeLabels = labels.filter(l => l.startsWith('type:'))
            const channelLabels = labels.filter(l => l.startsWith('channel:'))

            const problems = []
            if (typeLabels.length !== 1) {
              problems.push(
                `Expected exactly 1 type:* label, got ${typeLabels.length}: ${typeLabels.join(', ') || '(none)'}`
              )
            } else if (!allowedTypes.has(typeLabels[0])) {
              problems.push(`Unknown type label: ${typeLabels[0]}`)
            }

            if (channelLabels.length !== 1) {
              problems.push(
                `Expected exactly 1 channel:* label, got ${channelLabels.length}: ${channelLabels.join(', ') || '(none)'}`
              )
            } else if (!allowedChannels.has(channelLabels[0])) {
              problems.push(`Unknown channel label: ${channelLabels[0]}`)
            }

            if (problems.length > 0) {
              core.setFailed(problems.join('\n'))
              return
            }

            const typeLabel = typeLabels[0]
            const channelLabel = channelLabels[0]

            core.setOutput('pr_number', String(pr.number))
            core.setOutput('pr_title', pr.title || '')

            if (typeLabel === 'type:docs' || typeLabel === 'type:skip') {
              core.notice(`Release disabled: ${typeLabel} (${channelLabel})`)
              core.setOutput('release_enabled', 'false')
              return
            }

            core.setOutput('release_enabled', 'true')
            core.setOutput('release_bump', typeLabel.split(':', 2)[1]) // patch|minor|major
            core.setOutput('release_channel', channelLabel.split(':', 2)[1]) // stable|rc

      - name: Compute lowercase image name
        if: steps.intent.outputs.release_enabled == 'true'
        id: image-name
        shell: bash
        run: |
          set -euo pipefail
          lower="${GITHUB_REPOSITORY,,}"
          echo "IMAGE_NAME_LOWER=${lower}" >> "$GITHUB_ENV"
          echo "image_name_lower=${lower}" >> "$GITHUB_OUTPUT"

      - name: Compute effective version
        if: steps.intent.outputs.release_enabled == 'true'
        shell: bash
        env:
          RELEASE_BUMP: ${{ steps.intent.outputs.release_bump }}
          RELEASE_CHANNEL: ${{ steps.intent.outputs.release_channel }}
        run: ./.github/scripts/compute-version.sh

      - name: Export version outputs
        if: steps.intent.outputs.release_enabled == 'true'
        id: version
        shell: bash
        run: |
          set -euo pipefail
          echo "app_effective_version=${APP_EFFECTIVE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_prerelease=${RELEASE_PRERELEASE}" >> "$GITHUB_OUTPUT"

      - name: Compute image tags
        if: steps.intent.outputs.release_enabled == 'true'
        id: image-tags
        shell: bash
        run: |
          set -euo pipefail
          image="${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name_lower }}"
          if [[ "${RELEASE_CHANNEL}" == "stable" ]]; then
            # Keep version tag first to avoid "latest updated but version missing" partial state.
            echo "tags_csv=${image}:v${APP_EFFECTIVE_VERSION},${image}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags_csv=${image}:v${APP_EFFECTIVE_VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate platforms for smoke gate
        if: steps.intent.outputs.release_enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          required_platforms=("${PLATFORM_AMD64}" "${PLATFORM_ARM64}")
          normalized=",${PLATFORMS// /},"
          for platform in "${required_platforms[@]}"; do
            if [[ "${normalized}" != *",${platform},"* ]]; then
              echo "Missing required platform in PLATFORMS=${PLATFORMS}: ${platform}" >&2
              exit 1
            fi
          done

  docker-amd64:
    name: Build + Smoke + Push Candidate (linux/amd64)
    runs-on: ubuntu-latest
    needs: [release-meta]
    if: needs.release-meta.outputs.release_enabled == 'true'
    permissions:
      contents: read
      packages: write
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build smoke image (linux/amd64, load)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.PLATFORM_AMD64 }}
          push: false
          load: true
          tags: |
            ${{ env.REGISTRY }}/${{ needs.release-meta.outputs.image_name_lower }}:smoke-${{ github.run_id }}-${{ github.run_attempt }}-amd64
            ${{ env.REGISTRY }}/${{ needs.release-meta.outputs.image_name_lower }}:candidate-${{ github.run_id }}-${{ github.run_attempt }}-amd64
          build-args: |
            APP_EFFECTIVE_VERSION=${{ needs.release-meta.outputs.app_effective_version }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ needs.release-meta.outputs.image_name_lower }}:buildcache-amd64
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ needs.release-meta.outputs.image_name_lower }}:buildcache-amd64,mode=max

      - name: Smoke test image (linux/amd64)
        shell: bash
        env:
          SMOKE_TAG: ${{ env.REGISTRY }}/${{ needs.release-meta.outputs.image_name_lower }}:smoke-${{ github.run_id }}-${{ github.run_attempt }}-amd64
          SMOKE_CONTAINER_NAME: smoke-codex-vibe-monitor-amd64-${{ github.run_id }}-${{ github.run_attempt }}
          SMOKE_PLATFORM: ${{ env.PLATFORM_AMD64 }}
        run: ./.github/scripts/smoke-test-image.sh "$SMOKE_TAG"

      - name: Push candidate image (linux/amd64)
        shell: bash
        env:
          IMAGE_NAME_LOWER: ${{ needs.release-meta.outputs.image_name_lower }}
        run: |
          set -euo pipefail
          image="${{ env.REGISTRY }}/${IMAGE_NAME_LOWER}"
          suffix="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          candidate_amd64="${image}:candidate-${suffix}-amd64"
          echo "[push] ${candidate_amd64}"
          docker push "${candidate_amd64}"

  docker-arm64:
    name: Build + Smoke + Push Candidate (linux/arm64)
    runs-on: ubuntu-24.04-arm
    needs: [release-meta]
    if: needs.release-meta.outputs.release_enabled == 'true'
    permissions:
      contents: read
      packages: write
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build smoke image (linux/arm64, load)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.PLATFORM_ARM64 }}
          push: false
          load: true
          tags: |
            ${{ env.REGISTRY }}/${{ needs.release-meta.outputs.image_name_lower }}:smoke-${{ github.run_id }}-${{ github.run_attempt }}-arm64
            ${{ env.REGISTRY }}/${{ needs.release-meta.outputs.image_name_lower }}:candidate-${{ github.run_id }}-${{ github.run_attempt }}-arm64
          build-args: |
            APP_EFFECTIVE_VERSION=${{ needs.release-meta.outputs.app_effective_version }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ needs.release-meta.outputs.image_name_lower }}:buildcache-arm64
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ needs.release-meta.outputs.image_name_lower }}:buildcache-arm64,mode=max

      - name: Smoke test image (linux/arm64)
        shell: bash
        env:
          SMOKE_TAG: ${{ env.REGISTRY }}/${{ needs.release-meta.outputs.image_name_lower }}:smoke-${{ github.run_id }}-${{ github.run_attempt }}-arm64
          SMOKE_CONTAINER_NAME: smoke-codex-vibe-monitor-arm64-${{ github.run_id }}-${{ github.run_attempt }}
          SMOKE_PLATFORM: ${{ env.PLATFORM_ARM64 }}
          SMOKE_TIMEOUT_SECS: "120"
        run: ./.github/scripts/smoke-test-image.sh "$SMOKE_TAG"

      - name: Push candidate image (linux/arm64)
        shell: bash
        env:
          IMAGE_NAME_LOWER: ${{ needs.release-meta.outputs.image_name_lower }}
        run: |
          set -euo pipefail
          image="${{ env.REGISTRY }}/${IMAGE_NAME_LOWER}"
          suffix="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          candidate_arm64="${image}:candidate-${suffix}-arm64"
          echo "[push] ${candidate_arm64}"
          docker push "${candidate_arm64}"

  release-publish:
    name: Release Publish (manifest + tag + GitHub Release)
    runs-on: ubuntu-latest
    needs: [release-meta, docker-amd64, docker-arm64]
    if: needs.release-meta.outputs.release_enabled == 'true'
    permissions:
      contents: write
      packages: write
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release manifest tags from smoke-verified images
        shell: bash
        env:
          TAGS_CSV: ${{ needs.release-meta.outputs.tags_csv }}
          IMAGE_NAME_LOWER: ${{ needs.release-meta.outputs.image_name_lower }}
        run: |
          set -euo pipefail
          image="${{ env.REGISTRY }}/${IMAGE_NAME_LOWER}"
          suffix="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          candidate_amd64="${image}:candidate-${suffix}-amd64"
          candidate_arm64="${image}:candidate-${suffix}-arm64"

          IFS=',' read -r -a tags <<< "${TAGS_CSV}"
          for tag in "${tags[@]}"; do
            [[ -z "${tag}" ]] && continue
            echo "[manifest] ${tag} <= ${candidate_amd64}, ${candidate_arm64}"
            for attempt in 1 2 3 4 5; do
              if docker buildx imagetools create --tag "${tag}" "${candidate_amd64}" "${candidate_arm64}" 2>"/tmp/imagetools-create-${attempt}.err"; then
                break
              fi
              if [[ "${attempt}" == "5" ]]; then
                echo "[manifest] failed after ${attempt} attempts for ${tag}" >&2
                if [[ -s "/tmp/imagetools-create-${attempt}.err" ]]; then
                  cat "/tmp/imagetools-create-${attempt}.err" >&2
                fi
                exit 1
              fi
              sleep_secs=$((attempt * 3))
              echo "[manifest] retry in ${sleep_secs}s (${attempt}/5): ${tag}" >&2
              sleep "${sleep_secs}"
            done
          done

      - name: Verify pushed manifest platforms
        shell: bash
        env:
          TAGS_CSV: ${{ needs.release-meta.outputs.tags_csv }}
          REQUIRED_PLATFORMS: ${{ env.PLATFORMS }}
        run: |
          set -euo pipefail
          IFS=',' read -r -a tags <<< "${TAGS_CSV}"
          for tag in "${tags[@]}"; do
            [[ -z "${tag}" ]] && continue
            echo "[verify] ${tag}"
            for attempt in 1 2 3 4 5; do
              if raw_json="$(docker buildx imagetools inspect "${tag}" --raw 2>"/tmp/imagetools-${attempt}.err")"; then
                if RAW_JSON="${raw_json}" python3 -c "import json, os, sys; tag = sys.argv[1]; manifest = json.loads(os.environ['RAW_JSON']); required = {p.strip() for p in os.environ.get('REQUIRED_PLATFORMS', '').split(',') if p.strip()}; platforms = {f\"{p.get('os')}/{p.get('architecture')}\" for p in [(item.get('platform') or {}) for item in manifest.get('manifests', [])] if p.get('os') and p.get('architecture')}; missing = sorted(required - platforms); missing and (_ for _ in ()).throw(SystemExit(f'missing required platforms for {tag}: {\", \".join(missing)} (detected: {sorted(platforms)})')); print(f'[verify] {tag}: detected {sorted(platforms)}')" "${tag}"
                then
                  break
                fi
              fi

              if [[ "${attempt}" == "5" ]]; then
                echo "[verify] failed after ${attempt} attempts for ${tag}" >&2
                if [[ -s "/tmp/imagetools-${attempt}.err" ]]; then
                  cat "/tmp/imagetools-${attempt}.err" >&2
                fi
                exit 1
              fi

              sleep_secs=$((attempt * 3))
              echo "[verify] retry in ${sleep_secs}s (${attempt}/5): ${tag}" >&2
              sleep "${sleep_secs}"
            done
          done

      - name: Create and push git tag
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.release-meta.outputs.release_tag }}
          APP_EFFECTIVE_VERSION: ${{ needs.release-meta.outputs.app_effective_version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          tag="${RELEASE_TAG}"
          sha="${GITHUB_SHA}"

          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            existing="$(git rev-list -n 1 "${tag}")"
            if [[ "${existing}" != "${sha}" ]]; then
              echo "Tag ${tag} already exists but points to ${existing} (expected ${sha})" >&2
              exit 1
            fi
            echo "Tag ${tag} already exists and points to ${sha}."
          else
            git tag -a "${tag}" -m "release ${APP_EFFECTIVE_VERSION}"
          fi

          git push origin "${tag}"

      - name: Create GitHub Release
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ needs.release-meta.outputs.release_tag }}
          RELEASE_PRERELEASE: ${{ needs.release-meta.outputs.release_prerelease }}
          RELEASE_PR_NUMBER: ${{ needs.release-meta.outputs.pr_number }}
          RELEASE_PR_TITLE: ${{ needs.release-meta.outputs.pr_title }}
          RELEASE_BUMP: ${{ needs.release-meta.outputs.release_bump }}
          RELEASE_CHANNEL: ${{ needs.release-meta.outputs.release_channel }}
        with:
          script: |
            const { owner, repo } = context.repo
            const tag = process.env.RELEASE_TAG
            const prerelease = process.env.RELEASE_PRERELEASE === 'true'
            const prNumber = process.env.RELEASE_PR_NUMBER
            const prTitle = process.env.RELEASE_PR_TITLE
            const bump = process.env.RELEASE_BUMP
            const channel = process.env.RELEASE_CHANNEL

            if (!tag) {
              core.setFailed('Missing RELEASE_TAG')
              return
            }

            let existing = null
            try {
              existing = await github.rest.repos.getReleaseByTag({ owner, repo, tag })
            } catch (err) {
              if (err.status !== 404) throw err
            }

            if (existing) {
              core.notice(`GitHub Release already exists for tag ${tag}, skipping.`)
              return
            }

            const bodyLines = [
              prNumber ? `PR: #${prNumber} ${prTitle || ''}`.trim() : 'PR: (unknown)',
              `Channel: ${channel || '(unknown)'}`,
              `Bump: ${bump || '(unknown)'}`,
              `Commit: ${context.sha}`,
            ]

            await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              name: tag,
              prerelease,
              body: bodyLines.join('\n'),
            })

            core.notice(`Created GitHub Release for tag ${tag}`)
