name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libsqlite3-dev

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.0

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Cache cargo directories
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cargo fmt check
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Cargo check
        run: cargo check --locked --all-targets --all-features

      - name: Set up Bun (optional)
        if: hashFiles('web/package.json') != ''
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Front-end lint (optional)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f web/package.json ]]; then
            cd web
            bun install --frozen-lockfile
            bun run lint
          else
            echo "No web/ package; skipping"
          fi

      - name: Front-end Storybook build (optional)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f web/package.json ]]; then
            cd web
            bun run storybook:build
          else
            echo "No web/ package; skipping"
          fi

      - name: Docs site build (optional)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f docs-site/package.json ]]; then
            bun install --cwd docs-site --frozen-lockfile
            cd docs-site
            DOCS_BASE="/octo-rill/" bun run build
          else
            echo "No docs-site/ package; skipping"
          fi

      - name: Assemble public docs site smoke check (optional)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d docs-site/doc_build && -d web/storybook-static ]]; then
            bash ./.github/scripts/assemble-pages-site.sh docs-site/doc_build web/storybook-static .tmp/pages-site
            test -f .tmp/pages-site/index.html
            test -f .tmp/pages-site/storybook/index.html
            test -f .tmp/pages-site/storybook.html
          else
            echo "docs-site/doc_build or web/storybook-static missing; skipping"
          fi

  unit-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libsqlite3-dev

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.0

      - name: Cache cargo directories
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run cargo test
        run: cargo test --locked --all-features

  frontend-e2e:
    name: Frontend E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            web/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('web/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ runner.os }}-playwright-${{ hashFiles('web/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install web dependencies
        run: |
          set -euo pipefail
          cd web
          bun install --frozen-lockfile

      - name: Install Playwright browser
        run: |
          set -euo pipefail
          cd web
          bunx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: |
          set -euo pipefail
          cd web
          bun run e2e

  worktree-bootstrap:
    name: Worktree Bootstrap Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Cache root Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-root-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-root-bun-

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Run worktree bootstrap smoke test
        run: bun run test:worktree-bootstrap

  build:
    name: Build (Release)
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, frontend-e2e, worktree-bootstrap]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libsqlite3-dev

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.0

      - name: Cargo build (release)
        run: cargo build --release --locked
